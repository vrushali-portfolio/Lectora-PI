/**
 * Passes in the Lectora group and displays all it's children.
 * @param {*} group refers to the Lectora object being referred to
 * @returns all the items that are within the Lectora group 
 * 
 */
function pageUpdate(group){
    let children=[];
    group.childArray.forEach(x=>{
        let loc = group.childArray.indexOf(x);
        
        let childObj = triv$("#"+x, getDisplayDocument());
        
        children[loc] = childObj;
        triv$(childObj).css("visibility","inherit");
        if(childObj[0].classList.contains("a_box")){
            setOpacity(childObj,VaropacityValue.defVal);
        }
        
        if(childObj[0].classList.contains("luckyCharm")){
            let regex= new RegExp(childObj[0].id);
            if(!regex.test(VariconList.value)){
                updateProgress(childObj[0].id);
            }
        }
        
        
    });
    
    return children;
}

text1768211.addInnerText('<div id=\"text1768211\" aria-hidden=\"true\"  class=\"hideMe a_text\" ><p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:11px;text-align:left;\" >\n<span class=\"text1768211Font1\"  >Peyronie\'s disease is the development of scar tissue, also known as Peyronie\'s plaque, under the skin of the penis, over time causing it to curve when erect. The exact cause of Peyronie\'s disease is unknown, but the plaque is thought to result from injury to the penis and/or possibly genetic factors. \n</span ></p >\n<p  style=\"margin-left:0px;text-indent:0px;margin-top:0px;margin-bottom:8px;text-align:left;\" >\n<span class=\"text1768211Font2\"  >Please view the video on the pathophysiology of Peyronie\'s disease </span ><a href=\"javascript:og1836724Object.actionShow()\"  ><span class=\"text1768211Font3\"  >here</span></a ><span class=\"text1768211Font4\"  >.</span ><span class=\"text1768211Font1\"  > <br /></span ></p >\n</div>\n');
