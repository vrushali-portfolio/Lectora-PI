    let children=[];
    group.childArray.forEach(x=>{
        let loc = group.childArray.indexOf(x);

        children[loc] = childObj;

document.addEventListener("DOMContentLoaded", function () {
  var hoverClass = "quiz-can-hover";
  var body = document.body;
  // 🔧 CONFIG – set per page
  var isTrueFalsePage = false;              // true for T/F pages
  var maxAttempts = isTrueFalsePage ? 1 : 2;
  // ---- helpers for submit enable/disable ----
  function getSubmitBtn() {
    return document.querySelector(".quiz-submit");
  }
  function disableSubmit() {
    var btn = getSubmitBtn();
    if (!btn) return;
    btn.classList.add("is-disabled");
    btn.setAttribute("aria-disabled", "true");
    btn.style.pointerEvents = "none";
    btn.style.opacity = "0.5";
  }
  function enableSubmit() {
    var btn = getSubmitBtn();
    if (!btn) return;
    btn.classList.remove("is-disabled");
    btn.removeAttribute("aria-disabled");
    btn.style.pointerEvents = "";
    btn.style.opacity = "";
  }
  function isAnyAnswerSelected() {
    // This catches native quiz inputs
    var checked = document.querySelector('input[type="radio"]:checked, input[type="checkbox"]:checked');
    return !!checked;
  }
  // Optional: show your existing popup if you have one
  // If you don't have a popup, it will fall back to alert.
  function showSelectAnswerWarning() {
    var warn = document.getElementById("SelectAnswerWarning_Q1") ||
               document.querySelector(".SelectAnswerWarning_Q1") ||
               document.querySelector("#Warning_CYP"); // fallback to your existing warning if you want
    if (warn) {
      warn.style.visibility = "inherit";
      warn.style.display = "block";
    } else {
      alert("Please select an answer and then click Submit.");
    }
  }
  // ---- your existing hover logic ----
  body.classList.add(hoverClass);
  var attemptsUsed = 0;
  var hoverKey = "hoverOff:" + location.pathname + location.search + location.hash;
  if (sessionStorage.getItem(hoverKey) === "1") body.classList.remove(hoverClass);
  function updateHoverBasedOnFeedback() {
    if (isTrueFalsePage) {
      if (attemptsUsed >= 1) body.classList.remove(hoverClass);
      return;
    }
    if (typeof getDisplayDocument !== "function") return;
    var displayDoc = getDisplayDocument();
    if (!displayDoc) return;
    var feedbacks = displayDoc.querySelectorAll(".feedback1");
    var correctVisible = false;
    feedbacks.forEach(function (el) {
      var vis = el.style.visibility;
      if (vis !== "hidden") {
        var text = (el.textContent || "").trim();
        if (/Congratulations!/i.test(text)) correctVisible = true;
      }
    });
    if (correctVisible || attemptsUsed >= maxAttempts) {
      body.classList.remove(hoverClass);
      sessionStorage.setItem(hoverKey, "1");
    } else {
      body.classList.add(hoverClass);
      sessionStorage.removeItem(hoverKey);
    }

    if (e.target && (e.target.matches('input[type="radio"]') || e.target.matches('input[type="checkbox"]'))) {

    }

text1806194.addInnerText('<div id=\"text1806194\" aria-hidden=\"true\"  style=\"overflow-y:auto;overflow-x:hidden;\" class=\"hideMe a_text\" ><p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\"  >Remember, you must always deliver Important Safety Information on all customer calls. \n</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\" style=\"background-color:transparent\" >\n&nbsp;</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\"  >Corporal Rupture or Other Serious Injury to the Penis: &nbsp;\n</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\" style=\"background-color:transparent\" >\n&nbsp;</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\"  >Injection of XIAFLEX into collagen-containing structures such as the corpora cavernosa of the penis may result in damage to those structures and possible injury such as corporal rupture (penile fracture). Therefore, XIAFLEX should be injected only into the Peyronie\'s plaque and care should be taken to avoid injecting into the urethra, nerves, blood vessels, corpora cavernosa or other collagen-containing structures of the penis. Cases of localized skin and soft tissue necrosis occurring as sequelae of penile hematoma, some requiring surgical intervention, have been reported postmarketing. \n</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\" style=\"background-color:transparent\" >\n&nbsp;</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\"  >Risk of Bleeding in Patients with Abnormal Coagulation: &nbsp;\n</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\" style=\"background-color:transparent\" >\n&nbsp;</span ></p >\n<p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1806194Font1\"  >In the XIAFLEX controlled trials in Peyronie\'s disease, 65.5% of XIAFLEX-treated patients developed penile hematoma, and 14.5% developed penile ecchymosis. Patients with abnormal coagulation (except for patients taking low-dose aspirin, eg, up to 150 mg per day) were excluded from participating in these studies. Therefore, the efficacy and safety of XIAFLEX in patients receiving anticoagulant medications (other than low-dose aspirin, eg, up to 150 mg per day) within 7 days prior to XIAFLEX administration is not known. In addition, it is recommended to avoid use of XIAFLEX in patients with coagulation disorders, including patients receiving concomitant anticoagulants (except for low-dose aspirin). \n</span ></p >\n</div>\n');
text1806194.build()
