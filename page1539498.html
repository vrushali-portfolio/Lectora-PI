document.addEventListener("DOMContentLoaded", function () {
  var hoverClass = "quiz-can-hover";

  // 🔧 CONFIG – set per page
  var isTrueFalsePage = false;              // true for T/F pages
  var maxAttempts = isTrueFalsePage ? 1 : 2;
  // ---- helpers for submit enable/disable ----
  function getSubmitBtn() {
    return document.querySelector(".quiz-submit");
  }
  function disableSubmit() {
    var btn = getSubmitBtn();
    if (!btn) return;
    btn.classList.add("is-disabled");
    btn.setAttribute("aria-disabled", "true");
    btn.style.pointerEvents = "none";
    btn.style.opacity = "0.5";
  }
  function enableSubmit() {
    var btn = getSubmitBtn();
    if (!btn) return;
    btn.classList.remove("is-disabled");
    btn.removeAttribute("aria-disabled");
    btn.style.pointerEvents = "";
    btn.style.opacity = "";
  }
  function isAnyAnswerSelected() {
    // This catches native quiz inputs
    var checked = document.querySelector('input[type="radio"]:checked, input[type="checkbox"]:checked');
    return !!checked;
  }
  // Optional: show your existing popup if you have one
  // If you don't have a popup, it will fall back to alert.

    var warn = document.getElementById("SelectAnswerWarning_Q1") ||

    if (warn) {
      warn.style.visibility = "inherit";
      warn.style.display = "block";
    } else {
      alert("Please select an answer and then click Submit.");
    }
  }
  // ---- your existing hover logic ----
  body.classList.add(hoverClass);

  var hoverKey = "hoverOff:" + location.pathname + location.search + location.hash;
  if (sessionStorage.getItem(hoverKey) === "1") body.classList.remove(hoverClass);

    if (isTrueFalsePage) {
      if (attemptsUsed >= 1) body.classList.remove(hoverClass);
      return;
    }
    if (typeof getDisplayDocument !== "function") return;
    var displayDoc = getDisplayDocument();
    if (!displayDoc) return;
    var feedbacks = displayDoc.querySelectorAll(".feedback1");
    var correctVisible = false;
    feedbacks.forEach(function (el) {
      var vis = el.style.visibility;
      if (vis !== "hidden") {
        var text = (el.textContent || "").trim();
        if (/Congratulations!/i.test(text)) correctVisible = true;
      }
    });
    if (correctVisible || attemptsUsed >= maxAttempts) {
      body.classList.remove(hoverClass);
      sessionStorage.setItem(hoverKey, "1");
    } else {
      body.classList.add(hoverClass);
      sessionStorage.removeItem(hoverKey);

text1807698.addInnerText('<div id=\"text1807698\" aria-hidden=\"true\"  class=\"hideMe a_text\" ><p  legLH=\"1.127\" style=\"margin-left:0px;text-indent:0px;line-height:1.080;margin-top:0px;margin-bottom:0px;text-align:left;\" >\n<span class=\"text1807698Font1\"  >Clinicians may be concerned about the potential for immunogenicity with products that are derived from a bacterial source, such as XIAFLEX. During clinical studies in Dupuytren\'s contracture and Peyronie\'s disease, patients were tested at multiple time points for antibodies to the protein components of XIAFLEX (AUX-I and AUX-II). In the Peyronie\'s disease clinical studies (Studies 1 and 2), at 6 weeks after the first treatment cycle of XIAFLEX 0.58 mg, approximately 75% of patients had antibodies against AUX-I and approximately 55% of patients had antibodies against AUX-II. Six weeks after the eighth injection (fourth treatment cycle) of XIAFLEX, more than 99% of XIAFLEX-treated patients developed high titers of antibodies to both AUX-I and AUX-II. As explained further on the next page, AUX-I and AUX-II share some characteristics with human matrix metalloproteinases (MMPs). Because of this similarity, it is a theoretical possibility that antibodies to AUX-I and AUX-II could interfere with human MMPs. However,</span ><span class=\"text1807698Font2\"  > in vitro</span ><span class=\"text1807698Font1\"  > studies have found no evidence of such interference. Furthermore, there is no clinical evidence of any safety concerns related to AUX-I and AUX-II antibodies interfering with the normal activity of human MMPs. &nbsp;\n</span ></p >\n</div>\n');
text1807698.build()
